name: Benchmark Regression

# Plain repo-specific CI (not a gh-automations reusable workflow) — the
# regression gate is specific to this repo's benchmark harness and gold
# datasets, so it stays local rather than living in the shared library.

on:
  pull_request:
    branches: [dev]
    paths:
      - "orthography2ipa/**"
      - "scripts/benchmark.py"
      - "scripts/check_benchmark_regression.py"
      - "benchmarks/results.json"
      - "benchmarks/results_ci_sample.json"
      - "tests/data/**"
      - ".github/workflows/benchmark-regression.yml"
  workflow_dispatch: {}

jobs:
  benchmark-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[test]"

      - name: Check benchmark regression
        # Measure the checkout (PYTHONPATH=$PWD), not any installed
        # package — same gotcha as scripts/benchmark.py --scoreboard.
        #
        # The PUBLISHED scoreboard (benchmarks/results.json) is FULL-dataset
        # and far too slow to re-run here. This gate instead re-scores at a
        # fixed UNIFORM sample (benchmark.CI_SAMPLE_LIMIT, same cap for every
        # language) and compares against benchmarks/results_ci_sample.json,
        # a baseline committed at that identical cap — so both sides are
        # sliced the same way and there is never a mixed-slice comparison.
        # Refresh that sample file (scripts/benchmark.py --ci-sample)
        # whenever the full scoreboard is regenerated.
        #
        # This job only reliably gates the self-contained gold datasets:
        # wikipron, mirandese and ipadict fetch their TSVs directly over
        # plain HTTP (stdlib urllib, no credentials), and ep_dialects is
        # bundled in tests/data/. cmudict (needs the TigreGotico-internal
        # `scriptconv` package) is not installed here;
        # scripts/benchmark.py's build_scoreboard() already catches its
        # ImportError and skips it, and check_benchmark_regression.py
        # treats a baseline row that wasn't reproduced this run as
        # "missing" (noted, not a regression) rather than failing the
        # job. That dataset is effectively best-effort/manual until its
        # loader is made CI-installable.
        #
        # epsilon=0.005 (absolute PER worsening) is the default: tight
        # enough to catch a real grapheme/allophone regression, loose
        # enough to absorb harness-level float noise between runs.
        run: |
          PYTHONPATH=$PWD .venv/bin/python scripts/check_benchmark_regression.py --epsilon 0.005
